version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: saltflow
      POSTGRES_USER: saltflow
      POSTGRES_PASSWORD: radhey12345
    ports:
      - "5433:5432"  # using 5433 to avoid conflict with local PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saltflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://saltflow:radhey12345@db:5432/saltflow
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
    stdin_open: true

volumes:
  postgres_data:
